#
# "kubeinit_services" tasks
#

- name: Check to see if the environment facts are set
  ansible.builtin.set_fact:
    environment_facts_set: "{{ kubeinit_bastion_host is defined }}"

- name: Prepare environment
  ansible.builtin.include_role:
    name: "../../roles/kubeinit_prepare"
    public: true
  when: not environment_facts_set

- name: Deploy the cluster services guest
  ansible.builtin.include_role:
    name: "../../roles/kubeinit_libvirt"
    tasks_from: "60_deploy_{{ hostvars[kubeinit_deployment_node_name].os }}_guest.yml"
    public: true
  vars:
    kubeinit_deployment_node_name: "{{ kubeinit_services_node_target }}"
    kubeinit_deployment_role: network

- name: Create OVN network
  ansible.builtin.include_role:
    name: "../../roles/kubeinit_libvirt"
    tasks_from: "deploy_network.yml"
    public: true
  with_items:
    - "{{ groups['all_ovn_hosts'] }}"
  loop_control:
    loop_var: cluster_role_item
  vars:
    kubeinit_deployment_node_name: "{{ cluster_role_item }}"
    kubeinit_deployment_role: network

- name: Configure the cluster common config
  ansible.builtin.include_role:
    name: "../../roles/kubeinit_{{ kubeinit_inventory_cluster_distro }}"
    tasks_from: 10_configure_common.yml
    public: true
  vars:
    kubeinit_deployment_node_name: "{{ kubeinit_services_node_target }}"
    kubeinit_deployment_role: network

- name: Setup the services pod
  ansible.builtin.include_role:
    name: ../../roles/kubeinit_services
    tasks_from: 00_create_service_pod.yml
    public: true
  with_items:
    - "{{ groups['all_service_nodes'] | list }}"
  loop_control:
    loop_var: cluster_role_item
  vars:
    kubeinit_deployment_node_name: "{{ cluster_role_item }}"
    kubeinit_deployment_role: service

- name: Prepare credentials for services
  ansible.builtin.include_role:
    name: ../../roles/kubeinit_services
    tasks_from: prepare_credentials.yml
    public: true
  with_items:
    - "{{ groups['all_service_nodes'] | list }}"
  loop_control:
    loop_var: cluster_role_item
  vars:
    kubeinit_deployment_node_name: "{{ cluster_role_item }}"
    kubeinit_deployment_role: service

- name: Start services containers
  ansible.builtin.include_role:
    name: ../../roles/kubeinit_services
    tasks_from: start_services_containers.yml
    public: true
  with_items:
    - "{{ groups['all_service_nodes'] | list }}"
  loop_control:
    loop_var: cluster_role_item
  vars:
    kubeinit_deployment_node_name: "{{ cluster_role_item }}"
    kubeinit_deployment_role: service
